<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quest Soaring — Terrain Preview</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #121418; font-family: system-ui, sans-serif; }
    #hud {
      position: fixed; left: 12px; top: 12px; color: #e6ebe0;
      background: rgba(26,26,31,0.85); padding: 10px 14px; border-radius: 8px;
      font-size: 13px; line-height: 1.6; pointer-events: none; z-index: 10;
    }
    #hud kbd { background: #2a3540; padding: 1px 6px; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="hud">
    <strong>Terrain Preview</strong> (same algo as Unity)<br>
    <kbd>Drag</kbd> orbit · <kbd>Scroll</kbd> zoom · <kbd>WASD</kbd> pan<br>
    <span id="stats">Loading…</span>
  </div>
  <script type="importmap">
  { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/" } }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { buildChunkMesh, chunkCoords, CHUNK } from './chunk_mesh.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x889098);
    scene.fog = new THREE.Fog(0x889098, 800, 2800);

    const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 1, 5000);
    camera.position.set(400, 650, 400);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 500, 0);
    controls.enableDamping = true;

    scene.add(new THREE.AmbientLight(0xffffff, 0.55));
    const sun = new THREE.DirectionalLight(0xfff5e6, 1.1);
    sun.position.set(200, 400, 100);
    scene.add(sun);

    const chunks = new Map();
    const root = new THREE.Group();
    scene.add(root);

    function addChunk(cx, cz) {
      const key = `${cx},${cz}`;
      if (chunks.has(key)) return;
      const data = buildChunkMesh(cx, cz);
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.Float32BufferAttribute(data.verts, 3));
      geo.setAttribute('color', new THREE.Float32BufferAttribute(data.colors, 3));
      geo.setIndex(data.tris);
      geo.computeVertexNormals();
      const mat = new THREE.MeshLambertMaterial({ vertexColors: true, flatShading: true });
      const mesh = new THREE.Mesh(geo, mat);
      root.add(mesh);
      chunks.set(key, mesh);
    }

    function syncChunks() {
      const t = controls.target;
      const needed = new Set(chunkCoords(t.x, t.z, 2).map(([x,z]) => `${x},${z}`));
      needed.forEach(k => { const [x,z] = k.split(',').map(Number); addChunk(x, z); });
      for (const [k, mesh] of chunks) {
        if (!needed.has(k)) { root.remove(mesh); mesh.geometry.dispose(); chunks.delete(k); }
      }
      document.getElementById('stats').textContent =
        `Chunks: ${chunks.size} · Target: ${t.x.toFixed(0)}, ${t.y.toFixed(0)}, ${t.z.toFixed(0)} m`;
    }

    syncChunks();
    const keys = {};
    addEventListener('keydown', e => keys[e.code] = true);
    addEventListener('keyup', e => keys[e.code] = false);
    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    let lastSync = 0;
    function animate() {
      requestAnimationFrame(animate);
      const spd = 4;
      if (keys.KeyW) controls.target.z -= spd;
      if (keys.KeyS) controls.target.z += spd;
      if (keys.KeyA) controls.target.x -= spd;
      if (keys.KeyD) controls.target.x += spd;
      if (Date.now() - lastSync > 200) { syncChunks(); lastSync = Date.now(); }
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
    console.log('[TerrainPreview] Ready — chunk size', CHUNK, 'm');
  </script>
</body>
</html>
