<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quest Soaring — Terrain Preview</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0e1014; font-family: system-ui, sans-serif; }
    #hud {
      position: fixed; left: 12px; top: 12px; color: #d8dcd6;
      background: rgba(18,18,22,0.92); padding: 10px 14px; border-radius: 8px;
      font-size: 13px; line-height: 1.6; z-index: 10; max-width: 380px;
    }
    #err { color: #f88; display: none; margin-top: 8px; }
    kbd { background: #2a2e34; padding: 1px 6px; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="hud">
    <strong>Terrain Preview</strong> · high-contrast biomes<br>
    <span style="opacity:0.85">Near-white alpine · light gray valleys · mid-gray forest · slate rivers</span><br>
    <kbd>Drag</kbd> orbit · <kbd>Scroll</kbd> zoom · <kbd>WASD</kbd> pan<br>
    <span id="stats">Loading…</span>
    <div id="err"></div>
  </div>
  <script type="importmap">
  {"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js",
   "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
  </script>
  <script type="module">
    import { buildChunkMesh, chunkCoords, CHUNK } from './chunk_mesh.js';

    const errEl = document.getElementById('err');
    const fail = msg => { errEl.style.display = 'block'; errEl.textContent = msg; console.error(msg); };
    if (location.protocol === 'file:') { fail('Run: python3 tools/terrain/serve.py'); throw new Error('file'); }

    try {
      const THREE = await import('three');
      const { OrbitControls } = await import('three/addons/controls/OrbitControls.js');

      const sky = 0xc8ccd4;
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(sky);
      scene.fog = new THREE.FogExp2(sky, 0.00055);

      const camera = new THREE.PerspectiveCamera(58, innerWidth / innerHeight, 1, 5000);
      camera.position.set(420, 480, 520);
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(innerWidth, innerHeight);
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.target.set(0, 280, 0);
      controls.enableDamping = true;
      controls.maxPolarAngle = Math.PI * 0.48;

      scene.add(new THREE.HemisphereLight(0xd8dce4, 0x3a4048, 0.65));
      const sun = new THREE.DirectionalLight(0xffffff, 0.95);
      sun.position.set(-120, 280, 180);
      scene.add(sun);

      const chunks = new Map(), root = new THREE.Group();
      scene.add(root);
      const mat = new THREE.MeshLambertMaterial({ vertexColors: true, flatShading: true });

      function addChunk(cx, cz) {
        const k = `${cx},${cz}`;
        if (chunks.has(k)) return;
        const d = buildChunkMesh(cx, cz);
        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.Float32BufferAttribute(d.verts, 3));
        geo.setAttribute('color', new THREE.Float32BufferAttribute(d.colors, 3));
        geo.setIndex(d.tris);
        geo.computeVertexNormals();
        root.add(new THREE.Mesh(geo, mat));
        chunks.set(k, true);
      }

      function sync() {
        const t = controls.target;
        const need = new Set(chunkCoords(t.x, t.z, 2).map(([x,z]) => `${x},${z}`));
        need.forEach(k => { const [x,z] = k.split(',').map(Number); addChunk(x, z); });
        document.getElementById('stats').textContent =
          `Chunks: ${chunks.size} · ${t.x.toFixed(0)}, ${t.z.toFixed(0)} m · flat grayscale`;
      }

      sync();
      const keys = {};
      addEventListener('keydown', e => keys[e.code] = true);
      addEventListener('keyup', e => keys[e.code] = false);
      addEventListener('resize', () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
      });
      let last = 0;
      (function loop() {
        requestAnimationFrame(loop);
        if (keys.KeyW) controls.target.z -= 4;
        if (keys.KeyS) controls.target.z += 4;
        if (keys.KeyA) controls.target.x -= 4;
        if (keys.KeyD) controls.target.x += 4;
        if (Date.now() - last > 200) { sync(); last = Date.now(); }
        controls.update();
        renderer.render(scene, camera);
      })();
      console.log('[TerrainPreview] Ridged grayscale — chunk', CHUNK);
    } catch (e) { fail('Load failed: ' + e.message); }
  </script>
</body>
</html>
