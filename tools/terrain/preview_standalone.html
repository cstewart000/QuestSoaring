<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quest Soaring — Terrain Preview</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #fafafa; font-family: system-ui, sans-serif; }
    #hud {
      position: fixed; left: 12px; top: 12px; color: #333;
      background: rgba(255,255,255,0.88); padding: 10px 14px; border-radius: 8px;
      font-size: 13px; line-height: 1.6; z-index: 10; max-width: 400px;
      border: 1px solid #ddd;
    }
    #err { color: #c00; display: none; margin-top: 8px; }
    kbd { background: #eee; padding: 1px 6px; border-radius: 3px; border: 1px solid #ccc; }
  </style>
</head>
<body>
  <div id="hud">
    <strong>Terrain Preview</strong> · erosion-based<br>
    <span style="opacity:0.8">Uplift → hydraulic erosion → drainage rivers · light gray</span><br>
    <kbd>Drag</kbd> orbit · <kbd>Scroll</kbd> zoom · <kbd>WASD</kbd> pan<br>
    <span id="stats">Loading…</span>
    <div id="err"></div>
  </div>
  <script type="importmap">
  {"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js",
   "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
  </script>
  <script type="module">
    import { buildChunkMesh, chunkCoords, CHUNK } from './chunk_mesh.js';

    const errEl = document.getElementById('err');
    const fail = msg => { errEl.style.display = 'block'; errEl.textContent = msg; console.error(msg); };
    if (location.protocol === 'file:') { fail('Run: python3 tools/terrain/serve.py'); throw new Error('file'); }

    try {
      const THREE = await import('three');
      const { OrbitControls } = await import('three/addons/controls/OrbitControls.js');

      const sky = 0xe4e6ea;
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(sky);
      scene.fog = new THREE.FogExp2(0xe8eaee, 0.00022);

      const camera = new THREE.PerspectiveCamera(58, innerWidth / innerHeight, 1, 5000);
      camera.position.set(420, 480, 520);
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(innerWidth, innerHeight);
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.target.set(0, 280, 0);
      controls.enableDamping = true;
      controls.maxPolarAngle = Math.PI * 0.48;

      const chunks = new Map(), root = new THREE.Group();
      scene.add(root);
      const fillMat = new THREE.MeshBasicMaterial({ vertexColors: true, flatShading: true });
      const edgeMat = new THREE.LineBasicMaterial({ color: 0x666666, transparent: true, opacity: 0.35 });

      function addChunk(cx, cz) {
        const k = `${cx},${cz}`;
        if (chunks.has(k)) return;
        const d = buildChunkMesh(cx, cz);
        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.Float32BufferAttribute(d.verts, 3));
        geo.setAttribute('color', new THREE.Float32BufferAttribute(d.colors, 3));
        geo.setIndex(d.tris);
        geo.computeVertexNormals();
        const group = new THREE.Group();
        group.add(new THREE.Mesh(geo, fillMat));
        group.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo, 12), edgeMat));
        root.add(group);
        chunks.set(k, group);
        console.log('[TerrainPreview] Chunk with wireframe edges', k);
      }

      function sync() {
        const t = controls.target;
        const need = new Set(chunkCoords(t.x, t.z, 2).map(([x,z]) => `${x},${z}`));
        need.forEach(k => { const [x,z] = k.split(',').map(Number); addChunk(x, z); });
        for (const [k, g] of chunks)
          if (!need.has(k)) { root.remove(g); g.traverse(o => o.geometry?.dispose()); chunks.delete(k); }
        document.getElementById('stats').textContent =
          `Chunks: ${chunks.size} · ${t.x.toFixed(0)}, ${t.z.toFixed(0)} m`;
      }

      sync();
      const keys = {};
      addEventListener('keydown', e => keys[e.code] = true);
      addEventListener('keyup', e => keys[e.code] = false);
      addEventListener('resize', () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
      });
      let last = 0;
      (function loop() {
        requestAnimationFrame(loop);
        if (keys.KeyW) controls.target.z -= 4;
        if (keys.KeyS) controls.target.z += 4;
        if (keys.KeyA) controls.target.x -= 4;
        if (keys.KeyD) controls.target.x += 4;
        if (Date.now() - last > 200) { sync(); last = Date.now(); }
        controls.update();
        renderer.render(scene, camera);
      })();
      console.log('[TerrainPreview] Concept art style — chunk', CHUNK);
    } catch (e) { fail('Load failed: ' + e.message); }
  </script>
</body>
</html>
